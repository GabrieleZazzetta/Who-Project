name: assessment_tool
description: A new Flutter project.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # Abbiamo mantenuto Riverpod alla v2, perfetto per evitare conflitti!
  flutter_riverpod: ^2.4.9 
  pdf: ^3.11.1
  printing: ^5.12.0
  path_provider: ^2.1.2
  google_fonts: ^6.2.1
  responsive_builder: ^0.7.1
  intl: ^0.19.0
  
  # --- ISAR DATABASE ---
  isar: ^3.1.0
  isar_flutter_libs: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  
  # --- ISAR GENERATOR ---
  build_runner: ^2.4.6
  isar_generator: ^3.1.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/maps/

# --- FIX PER ANDROID AGP 8.0+ ---
dependency_overrides:
  isar_flutter_libs:
    git:
      url: https://github.com/MrLittleWhite/isar_flutter_libs.git