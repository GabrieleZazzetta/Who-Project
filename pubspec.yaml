name: assessment_tool
description: A new Flutter project.

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.1.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  flutter_riverpod: ^2.4.9
  crypto: ^3.0.3
  pdf: ^3.11.1
  printing: ^5.12.0
  path_provider: ^2.1.2
  google_fonts: ^6.2.1
  responsive_builder: ^0.7.1
  intl: ^0.20.2
  go_router: ^14.0.0
  connectivity_plus: ^6.0.3
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.1
  cloud_firestore: ^5.0.2

  # EXPORT REPORT
  share_plus: ^7.2.2

  # PLUGIN FOTOCAMERA
  image_picker: ^1.1.2

  # ISAR DATABASE
  isar: ^3.1.0
  isar_flutter_libs: ^3.1.0
  fl_chart: ^1.2.0
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  http: ^1.6.0
  flutter_map_marker_cluster: ^8.2.2
  mapbox_maps_flutter: ^2.23.0
  shared_preferences: ^2.5.5
  flutter_localizations:
    sdk: flutter
  firebase_storage: ^12.4.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  mocktail: ^1.0.3
  remove_from_coverage: ^2.0.0
  flutter_lints: ^3.0.0

  # ISAR GENERATOR
  build_runner: ^2.4.6
  isar_generator: ^3.1.0
  go_router_builder: ^2.7.1
  fake_cloud_firestore: ^3.1.0
  firebase_auth_mocks: ^0.14.2
  firebase_storage_mocks: ^0.7.0

  path_provider_platform_interface: any
  share_plus_platform_interface: any
flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/maps/
    - assets/templates/

# FIX PER ANDROID AGP 8.0+
dependency_overrides:
  isar_flutter_libs:
    git:
      url: https://github.com/MrLittleWhite/isar_flutter_libs.git
