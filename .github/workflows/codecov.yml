name: Flutter CI & Codecov

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.x' # Sostituisci con la tua versione se diversa
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      # (Opzionale) Genera i file di build_runner se non sono committati
      # - name: Run Build Runner
      #   run: dart run build_runner build --delete-conflicting-outputs

      - name: Run Tests with Coverage
        run: flutter test --coverage

      - name: Remove Generated Files from Coverage
        run: dart run remove_from_coverage -f coverage/lcov.info -r "\.g\.dart$"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
